[workspace]
resolver = "2"
members = [
    "crates/perroute-api",
    "crates/perroute-command-bus",
    "crates/perroute-commons",
    "crates/perroute-connectors", "crates/perroute-dispatcher",
    "crates/perroute-events-pooling",
    "crates/perroute-query-bus",
    "crates/perroute-storage",
]

[workspace.dependencies]
uuid = "1"
chrono = "0.4"
serde = "1"
serde_json = "1"
sqlx = { version = "0.8" }
tokio = { version = "1", features = ["full"] }
actix-web = "4"
actix-web-validator = "6"
dotenvy = "0.15"
tap = "1"
strum = "0.26"
strum_macros = "0.26"
thiserror = "1"
base58 = "0.2"
async-trait = "0.1"
secrecy = "0.10"
validator = "0.18"
url = "2"
derive-getters = "0.5"
derive_setters = "0.1"
bon = "2"
log = "0.4"
derive_more = "1"
