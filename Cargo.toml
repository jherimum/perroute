[package]
name = "omni_message"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
argon2 = { version = "0.5.0", features = ["std"] }
async-trait = "0.1.68"
axum = { version = "0.6.18", features = ["macros"] }
error-stack = "0.3.1"
once_cell = "1.17.1"
passwords = { version = "3.1.13", features = ["crypto"] }
serde = { version = "1.0.163", features = ["derive"] }
serde_json = "1.0.96"
sqlx = { version = "0.6.3", features = ["postgres", "runtime-tokio-rustls", "time", "uuid"] }
strum = { version = "0.24.1", features = ["derive"] }
strum_macros = "0.24.3"
tap = "1.0.1"
thiserror = "1.0.40"
time = "0.3.21"
tokio = { version = "1.28.1", features = ["macros", "rt", "rt-multi-thread"] }
uuid = { version = "1.3.2", features = ["fast-rng", "v4", "v3", "serde"] }



[dev-dependencies]
rstest = "0.17"
tower = { version = "0.4", features = ["util"] }
hyper = { version = "0.14", features = ["full"] }
