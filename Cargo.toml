[workspace]
resolver = "2"
members = [
    # runnable applications    
    "crates/perroute-backoffice-api",
    "crates/perroute-events",
    "crates/perroute-dispatcher",

    # dependent library crates
    "crates/perroute-cqrs",
    "crates/perroute-storage",
    "crates/perroute-connectors",
    "crates/perroute-commons",
    "crates/perroute-messaging",

]

[workspace.dependencies]
sqlx = "0.6"
anyhow = "1"
config = "0.13"
strum_macros = "0.25"
tap = "1"
tracing = "0.1"
thiserror = "1"
tracing-bunyan-formatter = "0.3"
tracing-log = "0.1"
tracing-subscriber = "0.3"
argon2 = "0.5"
handlebars = "4"
actix-web = "4"
jsonschema = "0.17"
derive-getters = "0.3"
uuid = "1"
regex = "1"
lazy_static = "1"
serde_json = "1"
secrecy = "0.8"
serde = "1"
strum = "0.25"
derive_builder = "0.12"
lettre = "0.10"
erased-serde = "0.3"
async-trait = "0.1"
once_cell = "1"
chrono = "0.4"
derive-new = "0.5"
tokio = "1"
lapin = "2"
futures = "0.3"
rand = "0.8"
dotenv = "0.15"
tracing-actix-web = "0.7"
url = "2"
http = "0.2"
tokio-util = "0.7"
executor-trait = "2"
async-recursion = "1"
derive_setters = "0.1"
validator = "0.16"
actix-web-validator = "5"
serde_with = "3"

[profile.release]
strip = true
lto = true
codegen-units = 1
