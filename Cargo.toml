[workspace]
members = [
    # runnable applications
    "crates/omni-backoffice-api",
    # "crates/omni-message-api",
    # "crates/omni-events",
    # "crates/omni-dispatcher",

    # dependent library crates
    "crates/omni-cqrs",
    "crates/omni-storage",
    "crates/omni-connectors",
    "crates/omni-commons",
]

[profile.release]
strip = true
lto = true
codegen-units = 1


